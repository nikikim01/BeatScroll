<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BeatScroll MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <script src="./app.js" defer></script>

  <body>
    <div class="left">
      <h1>BeatScroll MVP <span class="badge">keys = sound · presses = progress</span></h1>
      <div class="hint">
        Press <span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span><span class="kbd">F</span>
        or <span class="kbd">J</span><span class="kbd">K</span><span class="kbd">L</span><span class="kbd">;</span>
        to advance the text.<br><br>
        Each press “pays” one syllable-step. When the word’s pips fill, it advances to the next word.
        <span class="warn">(Syllables are approximate in this MVP.)</span>
      </div>

      <div class="row">
        <label>Presses per syllable</label>
        <input id="pps" type="range" min="1" max="4" step="1" value="1" />
        <span id="ppsLabel" class="kbd">1</span>
      </div>

      <div class="row">
        <label>Debounce (ms)</label>
        <input id="debounce" type="range" min="40" max="250" step="10" value="100" />
        <span id="debounceLabel" class="kbd">100</span>
      </div>

      <div class="row">
        <button id="loadBtn">Load Text</button>
        <button id="resetBtn">Reset</button>
        <button id="audioBtn">Enable Audio</button>
        <button id="ttsBtn">TTS: Off</button>
      </div>

      <textarea id="textInput">
Reading is usually passive. This makes it embodied. Each key press turns the crank. The page moves only when you move. Now the text is a music box cylinder and your fingers decide the pace.</textarea>

      <div class="stats" id="stats"></div>
    </div>

    <div class="right">
      <div class="stageWrap">
        <div class="playhead" id="playhead"></div>
        <div class="stage" id="stage" aria-label="reading stage"></div>
      </div>
    </div>


  </body>

</html>
